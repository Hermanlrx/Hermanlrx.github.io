name: Update ORCID Publications

on:
  push:
    branches: ["*"]
  schedule:
    - cron: '0 7 1-7 * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run update
        env:
          ORCID_ID: ${{ secrets.ORCID_ID }}
        run: python scripts/update_publications.py
      
      - name: Check for articles needing authors
        id: check_authors
        run: |
          if [ -f data/new_articles.json ]; then
            echo "needs_authors=true" >> $GITHUB_OUTPUT
          else
            echo "needs_authors=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check if publications.md changed
        id: check_changed
        run: |
          if git diff --quiet content/publications.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit changes
        if: steps.check_changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/publications.md
          git commit -m "Update publications from ORCID"
          git push
      
      - name: Create Pull Request
        if: steps.check_authors.outputs.needs_authors == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add new publications from ORCID"
          title: "New publications - add authors"
          body: |
            New publications detected. Please add authors before merging.
            
            Files to edit:
            - `content/publications.md`
            
            Look for `**ADD AUTHORS**` placeholders.
          branch: "update-publications"
          base: "main"
          labels: "publications"