name: Update ORCID Publications

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run update
        env:
          ORCID_ID: ${{ secrets.ORCID_ID }}
        run: python scripts/update_publications.py
      
      - name: Check for new articles
        id: check
        run: |
          if [ -f data/new_articles.json ]; then
            echo "new=true" >> $GITHUB_OUTPUT
          else
            echo "new=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create issue
        if: steps.check.outputs.new == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const articles = JSON.parse(require('fs').readFileSync('data/new_articles.json', 'utf8'));
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `New publications: ${articles.length} article(s)`,
              body: `Add authors to:\n${articles.map(a => `- ${a.title}`).join('\n')}`
            });
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/publications.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update publications"
          git push || true