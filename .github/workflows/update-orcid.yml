name: Update ORCID Publications

on:
  push:
    branches: ["*"]
  schedule:
    - cron: '0 7 1-7 * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run update
        env:
          ORCID_ID: ${{ secrets.ORCID_ID }}
        run: python scripts/update_publications.py
      
      - name: Check for new articles
        id: check
        run: |
          if [ -f data/new_articles.json ]; then
            echo "new=true" >> $GITHUB_OUTPUT
          else
            echo "new=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Pull Request
        if: steps.check.outputs.new == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add new publications from ORCID"
          title: "New publications - add authors"
          body: |
            New publications detected. Please add authors before merging.
            
            Files to edit:
            - `content/publications.md`
            
            Look for `**ADD AUTHORS**` placeholders.
          branch: "update-publications"
          base: "main"
          labels: "publications"